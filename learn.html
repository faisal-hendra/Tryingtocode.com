<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../components/art/ttc coin icon.png">
    <title>Trying to Learn</title>

    <link rel="stylesheet" href="./css/learn.css">   <!--LEARN,   FOR THIS PAGE-->
    <link rel="stylesheet" href="./css/general.css"> <!--GENERAL, FOR ALL PAGES-->
    <link rel="stylesheet" href="./css/prism.css">
    
    <script src="./scripts/learn.js" type="module"></script>
    <script src="./scripts/general.js" type="module"></script>
    <script>window.Prism = { manual: true };</script>
    <script src="./scripts/prism.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/pyodide@0.28.2/pyodide.min.js"></script>                  <!--Piodide import-->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"> <!--Font import-->
</head>
<body>
    <canvas id="render-canvas"></canvas>
    <div class="sidebar">
        <a href="index" title="Home"  class="logo" id="home-icon">
            <img src="components/art/ttc coin icon.png" alt="Coin logo" class="nice-button">
        </a>
        <button id="dropdown-button" class="toggle-dropdown">
            <img class="toggle-dropdown--img nice-button" src="components/art/yellow - toggle arrow up.png" alt="" id="toggle-button" >
        </button>
        <div class="dropdown">
            <ul class="dropdown--list">
                <li class="dropdown--element"><a href="index" title="Home">
                    <img class="dropdown--image nice-button" src="components/art/clean icon - 9.png" alt="home">
                </a></li>
                <li class="dropdown--element"><a href="learn" title="Learn">
                    <img class="dropdown--image nice-button" src="components/art/clean icon - 10.png" alt="learn">
                </a></li>
                <!--li class="dropdown--element"><a href="store" title="Shop">
                    <img class="dropdown--image" src="components/art/store icon 4.png" alt="Shop">
                </a></li-->
                <li class="dropdown--element"><a href="create" title="Learn">
                    <img class="dropdown--image nice-button" src="components/art/plus2.png" alt="create">
                </a></li>
            </ul>
        </div>
        <p id="coin-counter" class="main-font">10</p>
    </div>
    <div class="main-content" id="main-content">
        <div style="position: relative;">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p class="main-font">fetching resources...</p>
                <div class="loader-sprite"></div>
            </div>
        </div>
        
        <!--button class="main-font" id="change-setting">change setting</button-->
        <header>
            <h1 class="main-title main-font" id="main-title">Project Based Learning</h1>
            <p class="main-font">For total beginners.</p>
        </header>
        <canvas class="js-screen" id="learn-screen">
            <!--shows coins-->
        </canvas>
        <div id="project-parent" autocapitalize="off">
            <!-- projects insert here -->
        </div>
    </div>
</body>
</html>
