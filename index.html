<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="a free, gamelike site to learn code">
    <meta property="og:title" content="Trying to Code">
    <meta property="og:image" content="https://tryingtocode.com/components/art/ttc coin icon.png">
    <meta property="og:type" content="website">
    <meta name="keywords" content="free, learn, code">
    
    <title>Trying to Code</title>

    <link rel="icon" href="../components/art/ttc coin icon.png">
    <link rel="stylesheet" href="./css/general.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/prism.css">

    <script src="./scripts/index.js" type="module"></script>
    <script src="./scripts/general.js" type="module"></script>
    <script src="./firebase.js" type="module" defer></script>
    <script src="./scripts/footer.js"></script>
    <script src="./scripts/prism.js"></script>

    <script type="application/ld+json">{
    "@context": "https://schema.org",
    "@type": ["SoftwareApplication", "Course"],
    "name": "Trying to Code: Learn Python",
    "description": "A free, gamelike curriculum to learn python.",
    "applicationCategory": "Educational Game",
    "operatingSystem": "Any",
    "educationalLevel": "Beginner",
    "provider": {
        "@type": "Organization",
        "name": "Trying to Code",
        "sameAs": "https://tryingtocode.com/learn"
    },
    "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "category": "Free"
    }
    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pyodide@0.28.2/pyodide.min.js"></script>                  <!--Piodide import-->
</head>
<body>
    <canvas class="js-screen" id="learn-screen">
        <!--shows coins-->
    </canvas>
    <div class="sidebar">
        <a href="" title="Home"  class="logo" id="home-icon">
            <img src="components/art/ttc coin icon.png" alt="Coin logo" class="nice-button" draggable="false">
        </a>
        <button id="dropdown-button" class="toggle-dropdown">
            <img class="toggle-dropdown--img nice-button" src="components/art/yellow - toggle arrow up.png" alt="" id="toggle-button" draggable="false">
        </button>
        <div class="dropdown">
            <ul class="dropdown--list">
                <li class="dropdown--element"><a href="" title="Home">
                    <img class="dropdown--image nice-button" src="components/art/clean icon - 9.png" alt="House Icon" draggable="false">
                </a></li>
                <li class="dropdown--element"><a href="learn" title="Learn">
                    <img class="dropdown--image nice-button dark-glow" src="components/art/clean icon - 10.png" alt="blue book with L on it" draggable="false">
                </a></li>
                <!--li><a href="store/" title="Test">
                    <img src="components/art/bottle.png" alt="bottle with blue liquid">
                    <img src="components/art/store icon 4.png" alt="store icon">
                </a></li-->
            </ul>
        </div>
        <p id="coin-counter" class="main-font">10</p>
    </div>

    <div class="main-content main-font">
        <div id="welcome" class="welcome">
            <div class="welcome--demo">
                <div class="code-lines welcome--demo--input">

                </div>

                <img class="welcome--demo--arrow" src="./components/art/arrow.png" alt="-->">
                <a href="learn" title="Learn" class="welcome--demo--learn">
                    <button class="welcome--demo--learn-button"><img class="nice-button" src="./components/art/clean icon - 10.png" alt="learn"></button>
                </a>
            </div>
            <!--div class="welcome--sign-in">
                <a href="#signin" title="Learn">
                    <button class="welcome--demo--learn"><img class="nice-button" src="./components/art/clean icon - 10.png" alt=""></button>
                </a>
            </div-->
        </div>

        <p class="welcome--p">(by the way, it's free)</p>

        <div class="footer-parent">
            <ttc-footer copywrite="tryingtocode" mail-to="contact@tryingtocode.com" legal-src="./legal.html"></ttc-footer>
        </div>
    </div> 

    
    
    
    
</body>
</html>
