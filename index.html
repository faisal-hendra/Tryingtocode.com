<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="a free, gamelike site to learn code">
    <meta property="og:title" content="Trying to Code">
    <meta property="og:image" content="https://tryingtocode.com/components/art/ttc coin icon.png">
    <meta property="og:type" content="website">
    <meta name="keywords" content="free, learn, code">
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LeOLmEsAAAAAPksjOmHbSaPZ53wpQuThIHQok7z"></script>
    
    <title>Trying to Code</title>

    <link rel="icon" href="../components/art/ttc coin icon.png">
    <link rel="stylesheet" href="./css/general.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/prism.css">

    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <script src="./scripts/index.js" type="module"></script>
    <script src="./scripts/general.js" type="module"></script>
    <script src="./scripts/firebase-backend/firebase.js" type="module" defer></script>
    <script src="./scripts/web-elements/footer.js"></script>
    <script src="./scripts/web-elements/sidebar.js"></script>
    <script src="./scripts/prism.js" defer></script>

    <script type="application/ld+json">{
    "@context": "https://schema.org",
    "@type": ["SoftwareApplication", "Course"],
    "name": "Trying to Code: Learn Python",
    "description": "A free, gamelike curriculum to learn python.",
    "applicationCategory": "Educational Game",
    "operatingSystem": "Any",
    "educationalLevel": "Beginner",
    "provider": {
        "@type": "Organization",
        "name": "Trying to Code",
        "sameAs": "https://tryingtocode.com/learn"
    },
    "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "category": "Free"
    }
    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <canvas class="js-screen" id="learn-screen">
        <!--shows coins-->
    </canvas>
    
    <ttc-sidebar></ttc-sidebar>

    <div class="main-content main-font">
        <div id="welcome" class="welcome">
            <div class="welcome--demo">
                <div class="code-lines welcome--demo--input" id="welcome--demo--input">
                    <pre class="code-highlight" name="pretty-pre"><code class="main-font language-python welcome--demo--input--text" name="pretty-code" id="code-content">print('learn code')</code></pre>
                </div>

                <style>.row-container{display: flex; flex-direction: row; justify-content: center;}</style>

                <div class="row-container">
                    <button class="run-code welcome--demo--output-button nice-button" id="welcome--demo--output-button"><img class="welcome--demo--output-img" src="./components/art/play button - 1.png" alt="" draggable="false"></button>
                    <div class="code-lines welcome--demo--output">
                        <div class="welcome--demo--output--text" id="welcome--demo--output--text"></div>
                    </div>
                </div>

                <div class="row-container">
                    <img class="welcome--demo--arrow welcome-img" src="./components/art/arrow.png" alt="-->" draggable="false">
                    <a href="learn" title="Learn" class="welcome--demo--learn">
                        <style>.pad-top-30{padding-top: 30px;}</style>
                        <button class="welcome--demo--learn-button pad-top-30" draggable="false"><img class="nice-button welcome-img" src="./components/art/clean icon - 10.png" alt="learn"></button>
                    </a>
                </div>
                
            </div>

        </div>

        <p class="welcome--p">(by the way, it's free)</p>


        <!--div class="welcome--sign-in">
            <a href="#signin" title="Learn">
                <button class="welcome--demo--learn" id="toggle-signinup"><img class="nice-button" src="./components/art/profile - 4.png" alt=""></button>
            </a>
            <div id="sign-in-holder"></div>
        </div-->

        <div class="footer-parent">
            <ttc-footer copywrite="tryingtocode" mail-to="contact@tryingtocode.com" legal-src="./legal.html" privacy-src="/privacy-policy.html"></ttc-footer>
        </div>
    </div> 
    
    
    
    
</body>
</html>
